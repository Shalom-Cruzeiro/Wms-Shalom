# Render Blueprint - WMS Shalom (planos pagos: dados permanentes, sem hibernar)
services:
  - type: web
    name: shalom-wms
    runtime: node
    plan: starter            # web service pago (não dorme); ~US$7/mês
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        sync: false            # defina a senha do admin no painel do Render
      - key: USERS
        sync: false            # opcional: "fulano:senha1,ciclano:senha2"
      - key: DATABASE_URL
        fromDatabase:
          name: shalom-wms-db
          property: connectionString

databases:
  - name: shalom-wms-db
    plan: basic-256mb         # PostgreSQL pago (não expira); ~US$6-7/mês
